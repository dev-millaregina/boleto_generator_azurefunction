<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Código de Barras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Gerador de Código de Barras</h1>
            <p>Insira os dados para gerar seu código de barras</p>
        </div>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <form id="barcodeForm">
            <div class="form-group">
                <label for="dataVencimento">Data de Vencimento</label>
                <input 
                    type="date" 
                    id="dataVencimento" 
                    required
                    min=""
                >
            </div>

            <div class="form-group">
                <label for="valor">Valor (R$)</label>
                <input 
                    type="number" 
                    id="valor" 
                    placeholder="0,00"
                    step="0.01"
                    min="0"
                    required
                >
            </div>

            <button type="submit" class="btn-generate">Gerar Código de Barras</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Gerando código de barras...</p>
        </div>

        <div class="results" id="results">
            <div class="barcode-text">
                <label>Código de Barras:</label>
                <p id="barcodeValue"></p>
                <div class="copy-feedback" id="copyFeedback">✓ Copiado!</div>
            </div>

            <div class="barcode-image">
                <img id="barcodeImage" alt="Código de Barras">
            </div>

            <div class="button-group">
                <button type="button" class="btn-copy" onclick="copiarCodigo()">COPIAR</button>
                <button type="button" class="btn-download" onclick="baixarImagem()">BAIXAR</button>
                <button type="button" class="btn-validate" id="btnValidate" onclick="validarCodigoBarras()" disabled>VALIDAR</button>
                <button type="button" class="btn-clean" onclick="limparFormulario()">LIMPAR</button>
            </div>

            <div class="validation-result" id="validationResult"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
